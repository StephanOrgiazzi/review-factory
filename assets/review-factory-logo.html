<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>review-factory logo</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f8fafc;
      }

      .logo-frame {
        position: relative;
        width: 320px;
        height: 320px;
      }

      canvas,
      img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      canvas {
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="logo-frame">
      <img src="./review-factory-logo.svg" alt="review-factory animated logo fallback" />
      <canvas id="review-factory-logo" width="512" height="512"></canvas>
    </div>

    <script type="module">
      import { DotLottie } from "https://cdn.jsdelivr.net/npm/@lottiefiles/dotlottie-web/+esm";

      new DotLottie({
        autoplay: true,
        loop: true,
        canvas: document.getElementById("review-factory-logo"),
        src: "./review-factory-logo.json"
      });
    </script>
  </body>
</html>
